- name: prod_nirman_questionnaire_responses
  columns:
  - name: response_id
    description: Unique identifier for each participant's response.
  - name: participant
    description: Name of the participant providing the response.
  - name: workshop
    description: Name of the workshop attended by the participant.
  - name: workshop_phase
    description: Phase of the workshop during which the response was collected.
  - name: batch
    description: Numeric identifier for the batch of the workshop.
  - name: workshop_level
    description: Level of the workshop derived from the batch number.
  - name: category
    description: Category of the question being responded to.
  - name: question_code
    description: Code representing the specific question.
  - name: question
    description: Full text of the question being responded to.
  - name: short_question
    description: Abbreviated text of the question.
  - name: response
    description: Participant's response to the question, either as a text or integer.
- name: prod_nirman_questionnaire
  description: '[NIRMAN | Questionnaire] Granular log capturing survey responses across
    temporal touchpoints (Pre/Post) to measure psychometric perception changes. Wide-format:
    one row per participant per workshop phase, each question''s full text as the
    column name. Covers career preferences (8 cols, RANK 1-8), life criteria (9 cols,
    RANK 1-9), insecurities (10 cols, scale 1-10), social contribution intent (qualitative),
    self-assessment / mindset statements (up to 138, scale 1-5), and finance (5 cols).
    JOIN to Demographics on Participant_ID for profile data. SCALE GUIDE — Career
    preferences: RANK 1 = most preferred, 8 = least preferred. SCALE GUIDE — Life
    criteria: RANK 1 = most important, 9 = least important. SCALE GUIDE — Insecurities
    (1-10): 1 = least insecure, 10 = very insecure. SCALE GUIDE — Statements (1-5): 1 = least applicable,
    5 = most applicable. Phase mapping: Pre = Before Workshop ; Post = After Workshop.'
  meta:
    domain: NIRMAN Social Leadership Program
    table_role: Questionnaire — subjective / psychometric data
    join_key: Participant_ID
    workshop_phase_map:
      Pre: Initial / Start / Baseline
      Post: After / Follow-up / Success
    scale_conventions:
      career_preferences_ranking:
        type: ordinal rank
        range: 1-8
        columns_example: Government_Service, Own_Business, Social_Work_Fulltime
        interpretation: 1 = most preferred, 8 = least preferred
        top_preference: column = 1
        least_preferred: column = 8
      life_criteria_ranking:
        type: ordinal rank
        range: 1-9
        columns_example: Fame, Financial_Security, Work_Satisfaction
        interpretation: 1 = most important, 9 = least important
        top_criterion: column = 1
        least_important: column = 9
      ten_point_insecurities:
        type: numeric scale
        range: 1-10
        question: How insecure are you about this?
        columns_example: Monetary_Compensation, Social_Acceptability, Response_Of_Parents
        interpretation: 1 = least insecure, 10 = very insecure
        highly_insecure: '>= 7'
        not_insecure: <= 3
      five_point_statements:
        type: applicability scale
        range: 1-5
        question: How much does this apply to you in the present situation?
        columns_example: I_Know_What_My_Values_Are
        interpretation: 1 = least applicable, 5 = most applicable
        highly_applicable: '>= 4'
        not_applicable: <= 2
    longitudinal_completion: GROUP BY Participant_ID HAVING COUNT(DISTINCT Workshop_Phase)
      = 2
  columns:
  - name: participant_id
    description: Unique identifier for the participant
    tests:
    - not_null
  - name: participant_name
    description: Participant full name
  - name: workshop_name
    description: Name of the workshop
  - name: batch
    description: Numeric batch identifier
  - name: workshop_level
    description: Sub-level of the batch (0.1, 0.2, or 0.3)
    tests:
    - accepted_values:
        values:
        - '0.1'
        - '0.2'
        - '0.3'
  - name: workshop_phase
    description: Phase of the workshop (pre/post)
    tests:
    - accepted_values:
        values:
        - Pre
        - Post
  - name: During My Productive Lifetime I Plan To Engage In Social Contri
    description: Participant's plan for social contribution engagement
    tests:
    - accepted_values:
        values:
        - Fulltime as a career
        - Part time
        - Volunteering frequently
        - Occasionally
        - Monetary contribution
        - Not yet decided / confused
