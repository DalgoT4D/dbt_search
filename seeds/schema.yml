  - name: state
    description: Name of the state, which is Maharashtra.
  - name: country
    description: Name of the country, which is India.
- name: maharashtra_taluka_master
  columns:
  - name: tehsil_name
    description: Name of the tehsil or taluka within the state of Maharashtra.
  - name: district
    description: Name of the district in which the tehsil is located.
  - name: state
    description: Name of the state, which is Maharashtra.
  - name: country
    description: Name of the country, which is India.
