version: 2
seeds:
- name: villages
  columns:
  - name: village_name
    description: Name of the village.
- name: raw_villages_sample
  columns:
  - name: village_column
    description: Name or identifier of the village in the sample dataset.
- name: state_master
  columns:
  - name: state_name
    description: Name of the state or province.
  - name: country
    description: Name of the country to which the state or province belongs.
- name: village_mapping
  columns:
